<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com Js</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body class="container p-5">
    <main>
        <h1>Cadastro</h1>
        <div class="container">
            <form >
                <div>
                    <label class="form-label" 
                    for="nome">Digite seu nome</label>

                    <input class="form-control p-1" 
                    type="nome p-1"
                    id="nome">
                </div>
                <div>   
                    <label class="form-label" for="idade">Digite a sua idade</label>

                    <input class="form-control" type="idade p-1" id="idade">
                </div>
                <div>
                    <label class="form-label" for="cargo">Digite o seu cargo</label>

                    <input class="form-control" type="cargo p-1" id="cargo">
                </div>
                <div>
                    <label class="form-label" for="departamento">Digite seu departamento</label>

                    <input class="form-control" type="departamneto p-1" id="departamento">
                </div>
                <div>
                    <label class="form-label" for="boolean">Tem acesso restrito</label>

                    <input class="form-control" type="boolean p-1" id="boolean">
                </div>
                <button class="btn btn-primary p-1" onclick="cracharvirtual()">Enviar dados</button>
            </form>

            <script src="formulario.js">
                console.log("Usuario cadastrado");
            </script>
        </div>
